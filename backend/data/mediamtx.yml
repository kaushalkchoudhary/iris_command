# MediaMTX configuration for IRIS Command
# RTSP input is re-published as HLS and WebRTC for frontend consumption

###############################################
# Global settings

logLevel: info
logDestinations: [stdout]

###############################################
# API (for debugging)

api: yes
apiAddress: :9997

###############################################
# RTSP server

rtsp: yes
rtspAddress: :8554
protocols: [tcp, udp]

###############################################
# HLS server

hls: yes
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: fmp4
hlsSegmentCount: 3
hlsSegmentDuration: 1s
hlsSegmentMaxSize: 50M
hlsAlwaysRemux: yes

###############################################
# WebRTC server

webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigins: ['*']
webrtcICEServers2: []
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189

###############################################
# Paths

paths:
  "~^processed_.*$":
    source: publisher

  analytics:
    source: publisher

  bcpdrone1:
    source: rtsp://bcp:bcp123@57.159.25.115:8554/bcpdrone1
  bcpdrone2:
    source: rtsp://bcp:bcp123@57.159.25.115:8554/bcpdrone2
